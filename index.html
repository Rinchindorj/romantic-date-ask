<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <title>💌 Болзоо</title>
</head>
<body>
  <div id="container">
    <h1>Сайн уу, өнөөдрийг хэр өнгөрүүлэв дээ? 💖</h1>
    <input type="text" id="response-input" placeholder="Хариултаа бичнэ үү..." />
    <button id="next-btn" style="display: none;">Дараагийн алхам</button>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const nextBtn = document.getElementById('next-btn');
      const responseInput = document.getElementById('response-input');

      responseInput.addEventListener('input', () => {
        nextBtn.style.display = responseInput.value.trim() !== '' ? 'inline-block' : 'none';
      });

      nextBtn.addEventListener('click', () => {
        alert("Button clicked!");
      });
    });
  </script>
</body>
</html>
